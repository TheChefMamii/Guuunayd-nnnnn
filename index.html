<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💗</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { overflow:hidden; background:#ffeef0; touch-action:none; width:100vw; height:100vh; }
        canvas.physics { position:fixed; top:0; left:0; z-index:1; display:block; }

        #scroll-wrap {
            position:fixed; top:0; left:0;
            width:100vw; height:100vh;
            display:none; z-index:20;
            pointer-events:none; overflow:hidden;
        }

        #ribbon {
            position:absolute;
            left:0; width:100vw;
            display:flex; flex-direction:column; align-items:center;
        }

        .row {
            position:relative; width:100vw;
            display:flex; align-items:center; justify-content:center;
            margin-bottom:4px; flex-shrink:0;
        }

        .harf {
            font-family:'Pacifico', cursive;
            line-height:0.95;
            background:linear-gradient(155deg,#a80028 0%,#ff2d6e 40%,#ff85b5 100%);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
            filter:drop-shadow(0 3px 12px rgba(160,0,40,0.3));
            position:relative; z-index:5;
            display:block; text-align:center; user-select:none;
        }

        .em-sol {
            position:absolute;
            right:calc(50% + min(12vw,58px));
            display:flex; flex-direction:column; align-items:flex-end; gap:1px; z-index:3;
        }
        .em-sag {
            position:absolute;
            left:calc(50% + min(12vw,58px));
            display:flex; flex-direction:column; align-items:flex-start; gap:1px; z-index:3;
        }
        .em-sol span, .em-sag span {
            display:block; line-height:1;
            animation:tit 1.9s ease-in-out infinite;
        }
        .em-sol span:nth-child(2),.em-sag span:nth-child(2){ animation-delay:.6s; }
        .em-sol span:nth-child(3),.em-sag span:nth-child(3){ animation-delay:1.1s; }
        @keyframes tit {
            0%,100%{ transform:scale(1) rotate(-7deg); }
            50%    { transform:scale(1.35) rotate(7deg); }
        }

        /* dalga canvas — yazının ÜSTünde (z:29 > yazı z:20) ama mesajın altında */
        #wave-canvas {
            position:fixed; inset:0;
            z-index:29; pointer-events:none; display:none;
        }

        #mesaj-wrap {
            position:fixed; inset:0; z-index:40;
            display:none; flex-direction:column;
            align-items:center; justify-content:center;
            gap:clamp(10px,3vw,20px);
            pointer-events:none; text-align:center; padding:0 24px;
        }

        .m-emoji {
            font-size:clamp(2rem,9vw,4rem);
            letter-spacing:10px; opacity:0;
        }
        .m-buyuk {
            font-family:'Pacifico', cursive;
            font-size:clamp(2.6rem,11vw,5.2rem);
            color:#fff;
            text-shadow:0 0 30px rgba(255,255,255,0.6), 0 4px 20px rgba(180,0,60,0.3);
            line-height:1.1; opacity:0;
        }
        .m-kucuk {
            font-family:'Pacifico', cursive;
            font-size:clamp(1.4rem,6vw,2.6rem);
            color:rgba(255,255,255,0.92);
            text-shadow:0 2px 12px rgba(180,0,60,0.25);
            opacity:0;
        }

        @keyframes fadeUp {
            from{ opacity:0; transform:translateY(28px) scale(0.88); }
            to  { opacity:1; transform:translateY(0) scale(1); }
        }
        @keyframes popIn {
            0%  { opacity:0; transform:scale(0.5); }
            65% { transform:scale(1.2); }
            100%{ opacity:1; transform:scale(1); }
        }
        @keyframes heartPulse {
            0%,100%{ transform:scale(1); }
            50%    { transform:scale(1.18); }
        }

        .sp {
            position:fixed; z-index:50; pointer-events:none;
            animation:spf ease-in-out forwards;
        }
        @keyframes spf {
            0%  { opacity:0; transform:translateY(0) scale(.3) rotate(0deg); }
            25% { opacity:1; }
            75% { opacity:1; }
            100%{ opacity:0; transform:translateY(-90px) scale(1.4) rotate(40deg); }
        }
    </style>
</head>
<body>

<div id="scroll-wrap">
  <div id="ribbon"></div>
</div>

<canvas id="wave-canvas"></canvas>

<div id="mesaj-wrap">
  <div class="m-emoji" id="me1">💗 💕 💖</div>
  <div class="m-buyuk" id="mb1">Günaydın</div>
  <div class="m-buyuk" id="mb2" style="font-size:clamp(1.8rem,7.5vw,3.4rem)">güzeller güzelim 🌹</div>
  <div class="m-kucuk" id="mk1">Seni çoook seviyorum</div>
  <div class="m-emoji" id="me2">💗 💕 💖</div>
</div>

<script>
var HARFLER = [
  { h:'G', b:1.00, s:['💗','✨','🌸'], r:['⭐','💕','✦']  },
  { h:'G', b:0.82, s:['💕','🩷'],       r:['🌸','✨']       },
  { h:'Ü', b:1.00, s:['💖','🩷','✨'], r:['🌸','💗','⭐']  },
  { h:'Ü', b:0.80, s:['⭐','💕'],       r:['💖','✦']        },
  { h:'N', b:1.00, s:['💕','✦','💗'], r:['💖','🌸','💕']  },
  { h:'N', b:0.78, s:['🌸','💗'],       r:['✨','⭐']        },
  { h:'A', b:1.00, s:['⭐','💗','🩷'], r:['✨','💕','💖']  },
  { h:'A', b:0.75, s:['💖','✨'],        r:['💗','🌸']       },
  { h:'Y', b:1.00, s:['💗','🌸','💖'], r:['✦','💗','🌸']  },
  { h:'Y', b:0.78, s:['💕','⭐'],        r:['💖','✨']       },
  { h:'D', b:1.00, s:['✨','💖','🩷'], r:['⭐','💗','✨']  },
  { h:'I', b:1.00, s:['💗','🌸','💕'], r:['💖','⭐','🩷']  },
  { h:'I', b:0.76, s:['✦','💗'],         r:['🌸','💕']      },
  { h:'N', b:1.00, s:['🌸','💗','💕'], r:['✨','💖','✦']  },
  { h:'N', b:0.80, s:['💕','💖'],        r:['💗','🌸']      },
  { h:'N', b:0.60, s:['✨'],              r:['💕']            },
  { h:'N', b:0.38, s:['💗'],              r:['✦']            },
];

var BASE = Math.min(window.innerWidth * 0.22, 108);

function buildRibbon() {
    var ribbon = document.getElementById('ribbon');
    var html = '';
    HARFLER.forEach(function(item) {
        var fs = Math.round(BASE * item.b);
        var rowH = Math.round(fs * 1.05);
        var emFs = Math.max(12, Math.min(Math.round(fs * 0.28), 26));
        var emFs2 = Math.round(emFs * 0.72);

        var solH = item.s.map(function(e,i){
            return '<span style="font-size:'+(i===1?emFs2:emFs)+'px;animation-delay:'+(i*0.55)+'s">'+e+'</span>';
        }).join('');
        var sagH = item.r.map(function(e,i){
            return '<span style="font-size:'+(i===1?emFs2:emFs)+'px;animation-delay:'+(i*0.55+0.25)+'s">'+e+'</span>';
        }).join('');

        html += '<div class="row" style="height:'+rowH+'px">'
              + '<div class="em-sol">'+solH+'</div>'
              + '<span class="harf" style="font-size:'+fs+'px;opacity:'+(0.35+item.b*0.65)+'">'+item.h+'</span>'
              + '<div class="em-sag">'+sagH+'</div>'
              + '</div>';
    });
    ribbon.innerHTML = html;
}
buildRibbon();

/* ══ SCROLL — JS ile, alttan yukarı ══ */
function startScroll(onLastLetterVisible) {
    var ribbon = document.getElementById('ribbon');
    var totalH = ribbon.scrollHeight;
    var currentY = window.innerHeight + 20;
    var pxPerFrame = (totalH + window.innerHeight) / (60 * 14);
    ribbon.style.position = 'absolute';
    ribbon.style.top = currentY + 'px';

    var lastT = null;
    var triggered = false;

    function step(ts) {
        if (!lastT) lastT = ts;
        var dt = ts - lastT; lastT = ts;
        currentY -= pxPerFrame * (dt / 16.67);
        ribbon.style.top = currentY + 'px';

        // Son N ekranın ortasına yaklaştığında tetikle
        var bottomOfRibbon = currentY + totalH;
        if (!triggered && bottomOfRibbon < window.innerHeight * 0.72) {
            triggered = true;
            onLastLetterVisible();
        }

        // Yazı tamamen çıkana kadar kaymaya devam et (su görünsün diye)
        if (bottomOfRibbon > -200) {
            requestAnimationFrame(step);
        }
    }
    requestAnimationFrame(step);
}

/* ══ MATTER.JS ══ */
var Engine=Matter.Engine,Render=Matter.Render,Runner=Matter.Runner,
    Bodies=Matter.Bodies,Composite=Matter.Composite,Body=Matter.Body;
var engine=Engine.create();
var render=Render.create({
    element:document.body, engine:engine,
    options:{width:window.innerWidth,height:window.innerHeight,wireframes:false,background:'transparent'}
});
render.canvas.className='physics';

var zemin=Bodies.rectangle(window.innerWidth/2,window.innerHeight+50,window.innerWidth*3,100,{isStatic:true});
var solDuvar=Bodies.rectangle(-25,window.innerHeight/2,50,window.innerHeight*3,{isStatic:true});
var sagDuvar=Bodies.rectangle(window.innerWidth+25,window.innerHeight/2,50,window.innerHeight*3,{isStatic:true});
Composite.add(engine.world,[zemin,solDuvar,sagDuvar]);
Render.run(render); Runner.run(Runner.create(),engine);

var parcalar=[];
var svgK="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff3366' width='30' height='30'%3E%3Cpath d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/%3E%3C/svg%3E";
var svgP="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff80b3' width='30' height='30'%3E%3Cpath d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/%3E%3C/svg%3E";
var svgA="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffb3cc' width='30' height='30'%3E%3Cpath d='M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z'/%3E%3C/svg%3E";
var renkler=[svgK,svgP,svgA];

var uretici=setInterval(function(){
    for(var i=0;i<3;i++){
        var x=Math.random()*window.innerWidth;
        var p=Bodies.circle(x,-30,15,{restitution:0.4,render:{sprite:{texture:renkler[Math.floor(Math.random()*renkler.length)]}}});
        parcalar.push(p); Composite.add(engine.world,p);
    }
},15);

setTimeout(function(){
    clearInterval(uretici);
    parcalar.forEach(function(p){
        var gX=(p.position.x-window.innerWidth/2)*0.002;
        var gY=(p.position.y-window.innerHeight/2)*0.002-0.15;
        Body.applyForce(p,p.position,{x:gX,y:gY});
    });
    setTimeout(function(){
        document.getElementById('scroll-wrap').style.display='block';
        startSparkles();
        // Son N görününce su başlasın
        startScroll(function(){
            startWave();
        });
    }, 500);
}, 6000);

/* ══ DALGA — yazının üstünden yükselir ══ */
function startWave(){
    var wc = document.getElementById('wave-canvas');
    wc.width = window.innerWidth;
    wc.height = window.innerHeight;
    wc.style.display = 'block';
    var ctx = wc.getContext('2d');
    var W = wc.width, H = wc.height;
    var fillY = H; // alttan başlar
    var speed = H / 185; // ~3sn'de dolar
    var t = 0;
    var mesajGosterildi = false;

    function frame(){
        t += 0.05;
        fillY = Math.max(fillY - speed, 0);
        ctx.clearRect(0,0,W,H);

        // Ana pembe dolgu
        ctx.fillStyle = 'rgba(255,75,140,0.95)';
        ctx.fillRect(0, fillY+22, W, H);

        // Dalga 1
        ctx.beginPath();
        ctx.moveTo(0, fillY+22);
        for(var x=0; x<=W; x+=3){
            ctx.lineTo(x, fillY+22 + Math.sin(x*0.021+t)*17 + Math.sin(x*0.012-t*0.8)*10);
        }
        ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
        ctx.fillStyle='rgba(255,50,125,0.97)';
        ctx.fill();

        // Dalga 2 açık
        ctx.beginPath();
        ctx.moveTo(0, fillY+22);
        for(var x=0; x<=W; x+=3){
            ctx.lineTo(x, fillY+22 + Math.sin(x*0.016-t+2)*12 + Math.sin(x*0.031+t*1.3)*7 - 14);
        }
        ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
        ctx.fillStyle='rgba(255,170,210,0.4)';
        ctx.fill();

        // Köpük şeridi
        ctx.beginPath();
        for(var x=0; x<=W; x+=3){
            var y = fillY+22 + Math.sin(x*0.021+t)*17 + Math.sin(x*0.012-t*0.8)*10 - 3;
            x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
        }
        ctx.strokeStyle='rgba(255,255,255,0.55)';
        ctx.lineWidth=3.5; ctx.stroke();

        // Ekran doldu = mesajı göster
        if(fillY <= 0 && !mesajGosterildi){
            mesajGosterildi = true;
            document.getElementById('scroll-wrap').style.display='none';
            setTimeout(showMesaj, 150);
        }

        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
}

/* ══ MESAJ ══ */
function showMesaj(){
    var wrap=document.getElementById('mesaj-wrap');
    wrap.style.display='flex';

    var sira=[
        {id:'me1', anim:'popIn 0.7s cubic-bezier(.34,1.56,.64,1) both',  delay:0},
        {id:'mb1', anim:'fadeUp 0.9s cubic-bezier(.34,1.56,.64,1) both', delay:260},
        {id:'mb2', anim:'fadeUp 0.9s cubic-bezier(.34,1.56,.64,1) both', delay:500},
        {id:'mk1', anim:'fadeUp 0.8s ease both',                          delay:740},
        {id:'me2', anim:'popIn 0.7s cubic-bezier(.34,1.56,.64,1) both',  delay:980},
    ];
    sira.forEach(function(it){
        setTimeout(function(){
            document.getElementById(it.id).style.animation=it.anim;
        }, it.delay);
    });

    setTimeout(function(){
        document.getElementById('me1').style.animation='heartPulse 1.5s ease-in-out infinite';
        document.getElementById('me2').style.animation='heartPulse 1.5s ease-in-out infinite 0.4s';
        startMesajSparkles();
    }, 1900);
}

function startSparkles(){
    var em=['✨','💫','🌸','⭐','💕','🌟','💗','💖','✦','🩷'];
    var si=setInterval(function(){
        var wrap=document.getElementById('scroll-wrap');
        if(!wrap || wrap.style.display==='none'){clearInterval(si);return;}
        var el=document.createElement('div'); el.className='sp';
        el.textContent=em[Math.floor(Math.random()*em.length)];
        el.style.fontSize=(0.8+Math.random()*0.9)+'rem';
        el.style.left=Math.random()<0.5?(Math.random()*11)+'vw':(87+Math.random()*11)+'vw';
        el.style.top=(5+Math.random()*88)+'vh';
        var dur=1.8+Math.random()*2;
        el.style.animationDuration=dur+'s';
        el.style.animationDelay=(Math.random()*.4)+'s';
        wrap.appendChild(el);
        setTimeout(function(){el.remove();},(dur+1)*1000);
    },220);
}

function startMesajSparkles(){
    var em=['💗','💕','💖','🌸','✨','💝','🌹','⭐','✦','🩷'];
    setInterval(function(){
        var el=document.createElement('div'); el.className='sp';
        el.textContent=em[Math.floor(Math.random()*em.length)];
        el.style.fontSize=(1+Math.random()*1.6)+'rem';
        el.style.left=(2+Math.random()*94)+'vw';
        el.style.top=(5+Math.random()*88)+'vh';
        var dur=2.5+Math.random()*2.5;
        el.style.animationDuration=dur+'s';
        document.body.appendChild(el);
        setTimeout(function(){el.remove();},(dur+1.2)*1000);
    },190);
}

window.addEventListener('resize',function(){
    render.canvas.width=window.innerWidth;
    render.canvas.height=window.innerHeight;
    Body.setPosition(zemin,{x:window.innerWidth/2,y:window.innerHeight+50});
    Body.setPosition(sagDuvar,{x:window.innerWidth+25,y:window.innerHeight/2});
});
</script>
</body>
</html>
